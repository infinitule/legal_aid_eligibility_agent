<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Legal Aid Eligibility &amp; Document Preparation Agent · NALSA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%96%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/mammoth.browser.min.js"></script>
<style>
:root {
  --ink: #1a1a1a;
  --ink-soft: #2a2a2a;
  --paper: #f5f1e8;
  --paper-light: #faf7f2;
  --paper-dark: #e8e1d0;
  --paper-darker: #d4c9b0;
  --accent: #8b0000;
  --accent-soft: #c44536;
  --gold: #b08d3c;
  --gold-soft: #c9a227;
  --gold-dim: rgba(176, 141, 60, 0.12);
  --muted: #6b6558;
  --border: #c9bfa8;
  --green: #3d5a3d;
  --green-soft: #2d6a4f;
  --amber: #a66b2c;
  --slate: #2c3e50;
  --mist: #8a9bb0;
  --red-dim: rgba(139, 0, 0, 0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Fraunces', Georgia, serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

body {
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139, 0, 0, 0.008) 2px, rgba(139, 0, 0, 0.008) 3px),
    radial-gradient(ellipse at top, rgba(176, 141, 60, 0.04), transparent 60%);
}

#root { min-height: 100vh; }

.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: var(--ink);
  color: var(--paper);
  padding: 28px 24px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  border-right: 1px solid #000;
}

.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: #0a0a0a; }
.sidebar::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }

.crest {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}

.case-no {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  color: var(--paper);
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}

.case-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 15px;
  color: var(--paper-dark);
  line-height: 1.35;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid #2a2a2a;
}

.meta-block {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid #2a2a2a;
}

.meta-block div { margin-bottom: 5px; }
.meta-block strong { color: var(--paper); font-weight: 500; }

.nav-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin: 20px 0 10px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin: 2px -8px;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
  font-family: 'Fraunces', serif;
  font-size: 14px;
  color: var(--paper-dark);
  user-select: none;
}

.nav-item:hover { background: #0e0e0e; color: var(--paper); }
.nav-item.active { background: var(--accent); color: #fff; }
.nav-item.active .nav-count { color: rgba(255,255,255,0.7); }

.nav-icon {
  width: 20px;
  height: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  opacity: 0.8;
}

.nav-count {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

.path-config {
  margin-top: 24px;
  padding-top: 18px;
  border-top: 1px solid #2a2a2a;
}

.path-config label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}

.path-config input {
  width: 100%;
  padding: 8px 10px;
  background: #0a0a0a;
  border: 1px solid #2a2a2a;
  color: var(--paper);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  border-radius: 2px;
}

.path-config input:focus { outline: none; border-color: var(--gold); }

.path-config small {
  display: block;
  margin-top: 6px;
  color: var(--muted);
  font-size: 10px;
  line-height: 1.4;
  font-style: italic;
}

/* MAIN */
.main {
  padding: 32px 48px 80px;
  overflow-x: hidden;
}

.view-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--ink);
}

.view-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 38px;
  letter-spacing: -0.02em;
  line-height: 1;
}

.view-title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
}

.view-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: right;
}
.view-meta strong { color: var(--ink); font-size: 13px; }

/* CONTROLS */
.controls {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 12px;
  margin-bottom: 28px;
  align-items: center;
}

.search-wrap { position: relative; }
.search-wrap::before {
  content: '⌕';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 18px;
}

.search-input {
  width: 100%;
  padding: 12px 14px 12px 40px;
  background: var(--paper-dark);
  border: 1px solid var(--border);
  font-family: 'Fraunces', serif;
  font-size: 15px;
  color: var(--ink);
  border-radius: 2px;
}

.search-input:focus { outline: none; border-color: var(--accent); background: #fff; }

.toggle-btn {
  padding: 12px 18px;
  background: transparent;
  border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}

.toggle-btn:hover { border-color: var(--ink); color: var(--ink); }
.toggle-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* PHASE SECTIONS (Ledger) */
.phase { margin-bottom: 44px; scroll-margin-top: 20px; }

.phase-header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 18px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.phase-marker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
}

.phase-name {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 400;
  font-style: italic;
  letter-spacing: -0.01em;
}

.phase-dates {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

/* ENTRY */
.entry {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 20px;
  padding: 16px 0;
  border-bottom: 1px dotted var(--border);
  align-items: flex-start;
}

.entry.highlighted {
  background: rgba(176, 141, 60, 0.14);
  margin: 0 -12px;
  padding: 16px 12px;
  border-radius: 2px;
  animation: flash 2.4s;
}

@keyframes flash {
  0% { background: rgba(176, 141, 60, 0.35); }
  100% { background: rgba(176, 141, 60, 0.14); }
}

.entry-left { text-align: center; }

.folder-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 72px;
  height: 56px;
  margin: 0 auto 6px;
  position: relative;
  cursor: pointer;
  transition: transform 0.15s ease;
}

.folder-icon:hover { transform: translateY(-2px) scale(1.05); }
.folder-svg { width: 100%; height: 100%; }

.folder-id {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -30%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  pointer-events: none;
}

.folder-empty .folder-svg path.folder-body { fill: #c9bfa8; }
.folder-empty .folder-id { color: #6b6558; }

.entry-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-transform: uppercase;
}

.entry-right { min-width: 0; }

.entry-summary {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
  margin-bottom: 6px;
}

.entry-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

.entry-actions {
  margin-top: 8px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.mini-btn {
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}

.mini-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--red-dim); }

.tag {
  padding: 2px 8px;
  border-radius: 2px;
  background: var(--paper-dark);
  border: 1px solid var(--border);
}

.tag-motion { background: #f4e4e1; border-color: var(--accent-soft); color: var(--accent); }
.tag-order { background: #e8e4d4; border-color: var(--gold); color: var(--amber); }
.tag-affidavit { background: #dde5dd; border-color: var(--green); color: var(--green); }
.tag-direction { background: #e4dfd0; border-color: var(--border); color: var(--muted); }
.tag-cmc { background: #d4c9b0; border-color: var(--muted); color: var(--ink); }
.tag-letter { background: transparent; }

/* Toast */
.copied-toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--ink);
  color: var(--paper);
  padding: 14px 22px;
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.25s;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  border-left: 3px solid var(--gold);
  z-index: 1000;
}

.copied-toast.show { opacity: 1; transform: translateY(0); }

/* SHARED: Section headers */
.section-head {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 500;
  font-style: italic;
  margin: 28px 0 4px;
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.section-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.section-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
}

/* DEADLINES VIEW */
.deadline-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }

.deadline-card {
  background: #fff;
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  border-radius: 3px;
  padding: 16px 18px;
  position: relative;
}

.deadline-card.urgent { border-top-color: var(--accent); background: var(--red-dim); }
.deadline-card.soon { border-top-color: var(--gold); background: rgba(176, 141, 60, 0.05); }
.deadline-card.future { border-top-color: var(--green); }
.deadline-card.past { opacity: 0.55; }

.deadline-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 4px;
}

.deadline-card.urgent .deadline-date { color: var(--accent); }
.deadline-card.soon .deadline-date { color: var(--amber); }
.deadline-card.future .deadline-date { color: var(--green); }

.deadline-countdown {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.deadline-countdown.urgent { color: var(--accent); font-weight: 600; }

.deadline-title {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 6px;
  line-height: 1.3;
}

.deadline-body {
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
  margin-bottom: 8px;
}

.deadline-rule {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  padding-top: 8px;
  border-top: 1px dotted var(--border);
}

/* SERVICE VIEW */
.service-table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.service-table th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 2px solid var(--border);
  background: var(--paper-dark);
}

.service-table td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(201, 191, 168, 0.4);
  vertical-align: top;
  font-size: 13px;
  line-height: 1.45;
}

.service-table tr:last-child td { border-bottom: none; }
.service-table tr:hover td { background: rgba(176, 141, 60, 0.04); }

.service-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
}

.service-check {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.service-check.ok { background: rgba(61, 90, 61, 0.12); color: var(--green); }
.service-check.miss { background: var(--red-dim); color: var(--accent); }

/* CROSS-EXAM TRACKER */
.xexam-table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}

.xexam-table th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
  padding: 10px 12px;
  text-align: left;
  border-bottom: 2px solid var(--border);
  background: var(--paper-dark);
}

.xexam-table td {
  padding: 12px;
  border-bottom: 1px solid rgba(201, 191, 168, 0.4);
  vertical-align: top;
  font-size: 13px;
  line-height: 1.55;
}

.xexam-table td.q-col { font-weight: 500; color: var(--ink); }
.xexam-table td.a-col { color: var(--slate); }
.xexam-table td.char-col { width: 140px; }

.xexam-textarea {
  width: 100%;
  min-height: 70px;
  padding: 8px;
  font-family: 'Fraunces', serif;
  font-size: 13px;
  line-height: 1.5;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--paper-light);
  resize: vertical;
}

.xexam-textarea:focus { outline: none; border-color: var(--accent); background: #fff; }

.char-select {
  width: 100%;
  padding: 6px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: #fff;
  cursor: pointer;
}

.char-complete { background: rgba(61, 90, 61, 0.1); color: var(--green); }
.char-partial { background: rgba(176, 141, 60, 0.1); color: var(--amber); }
.char-evasive { background: rgba(139, 0, 0, 0.08); color: var(--accent); }
.char-refused { background: rgba(139, 0, 0, 0.12); color: #5a0d0d; }

.add-row-btn {
  padding: 10px 16px;
  background: var(--ink);
  color: var(--gold);
  border: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
  margin-right: 8px;
}

.add-row-btn:hover { background: var(--accent); color: #fff; }

.export-btn {
  padding: 10px 16px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}

.export-btn:hover { border-color: var(--ink); color: var(--ink); }

/* DRAFT GENERATOR */
.draft-picker {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.draft-type {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
}

.draft-type:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(139,0,0,0.1); }
.draft-type.active { border-color: var(--accent); background: var(--red-dim); }

.draft-type-name {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 15px;
  margin-bottom: 4px;
}

.draft-type-rule {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 6px;
}

.draft-type-desc {
  font-size: 12px;
  color: var(--slate);
  line-height: 1.5;
}

.draft-output {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 28px 36px;
  font-family: 'Fraunces', serif;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  min-height: 320px;
  margin-top: 18px;
}

.draft-output-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.draft-params {
  background: var(--paper-dark);
  padding: 16px;
  border-radius: 3px;
  margin-bottom: 16px;
}

.draft-params label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 10px 0 4px;
}

.draft-params label:first-child { margin-top: 0; }

.draft-params input, .draft-params textarea {
  width: 100%;
  padding: 8px 10px;
  font-family: 'Fraunces', serif;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: #fff;
}

.draft-params textarea { resize: vertical; min-height: 60px; }

.draft-params input:focus, .draft-params textarea:focus { outline: none; border-color: var(--accent); }

/* LEXIS VIEW (adapted from the existing engine) */
.lexis-wrap {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
  min-height: 600px;
}

.lexis-left {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 18px;
}

.lexis-right {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 20px;
  overflow: hidden;
}

.lexis-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 3px;
  padding: 22px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.18s;
  background: var(--paper-light);
}

.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--red-dim); }

.upload-icon { font-size: 22px; display: block; margin-bottom: 6px; }

.upload-title {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 13px;
  margin-bottom: 4px;
}

.upload-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.active-doc {
  margin-top: 16px;
  padding: 12px 14px;
  background: var(--paper-dark);
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

.active-doc strong {
  font-family: 'Fraunces', serif;
  font-size: 13px;
  font-weight: 500;
  display: block;
  margin-bottom: 3px;
  color: var(--ink);
}

.analyze-btn {
  width: 100%;
  margin-top: 14px;
  padding: 12px;
  background: linear-gradient(135deg, #6b1313, var(--accent));
  color: #f5e8d8;
  border: none;
  border-radius: 3px;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.analyze-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(139,0,0,0.3); }
.analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* LEXIS analysis tabs */
.lexis-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
  overflow-x: auto;
}

.lexis-tab {
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.lexis-tab:hover { color: var(--ink); }
.lexis-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.lexis-badge {
  margin-left: 4px;
  background: var(--gold-dim);
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 9px;
  color: var(--amber);
}

/* LEXIS pipeline */
.pipe-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.pipe-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.15em; margin-bottom: 22px; }

.stage {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px dotted var(--border);
}

.stage-ico {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  border: 2px solid var(--border);
  background: #fff;
  transition: all 0.35s;
}

.stage-ico.done { border-color: var(--green); background: rgba(61,90,61,0.1); }
.stage-ico.active { border-color: var(--gold); background: var(--gold-dim); animation: stage-glow 1.1s infinite; }
.stage-ico.pend { opacity: 0.3; }

@keyframes stage-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(176,141,60,0.4); }
  50% { box-shadow: 0 0 0 7px rgba(176,141,60,0); }
}

.stage-name { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 500; padding-top: 5px; }
.stage-name.active { color: var(--gold); }
.stage-name.pend { color: var(--muted); }
.stage-log { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; line-height: 1.6; }

/* RISK cards */
.risk-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 22px; }
.risk-card {
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 14px;
  background: #fff;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.risk-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.risk-card.critical::before, .risk-card.high::before { background: var(--accent); }
.risk-card.medium::before { background: var(--gold); }
.risk-card.low::before { background: var(--green); }

.risk-num { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 700; line-height: 1; }
.risk-card.critical .risk-num, .risk-card.high .risk-num { color: var(--accent); }
.risk-card.medium .risk-num { color: var(--gold); }
.risk-card.low .risk-num { color: var(--green); }

.risk-lbl { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px; }

/* WELCOME */
.welcome {
  text-align: center;
  padding: 40px 20px;
  max-width: 540px;
  margin: 0 auto;
}

.welcome-ico { font-size: 40px; margin-bottom: 14px; display: block; }
.welcome-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 300; margin-bottom: 8px; line-height: 1.2; }
.welcome-title em { color: var(--accent); font-style: italic; }
.welcome-desc { font-size: 14px; color: var(--slate); line-height: 1.7; margin-bottom: 24px; }

.err-box {
  margin: 14px 0;
  padding: 10px 14px;
  border: 1px solid var(--accent);
  border-radius: 3px;
  background: var(--red-dim);
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  line-height: 1.6;
}

/* Empty states */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-style: italic;
  font-size: 15px;
}

.hidden { display: none !important; }

/* Prose (shared) */
.prose {
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink);
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 20px 24px;
  white-space: pre-wrap;
  margin-bottom: 18px;
}

@media (max-width: 1100px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .main { padding: 24px; }
  .view-title { font-size: 28px; }
  .deadline-grid, .risk-grid, .draft-picker { grid-template-columns: 1fr; }
  .lexis-wrap { grid-template-columns: 1fr; }
  .la-grid { grid-template-columns: 1fr !important; }
}

/* ============================================================
   LEGAL AID ELIGIBILITY MODULE
   ============================================================ */
.la-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  align-items: start;
}
.la-panel {
  background: var(--paper-light);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 22px 24px;
}
.la-panel h3 {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
}
.la-panel .la-sub {
  font-size: 12.5px;
  color: var(--muted);
  margin-bottom: 18px;
  line-height: 1.5;
}
.la-field { margin-bottom: 16px; }
.la-field > label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--slate);
  margin-bottom: 6px;
}
.la-input, .la-select, .la-textarea {
  width: 100%;
  font-family: 'Fraunces', serif;
  font-size: 14px;
  color: var(--ink);
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 9px 11px;
}
.la-textarea { resize: vertical; min-height: 72px; line-height: 1.6; }
.la-input:focus, .la-select:focus, .la-textarea:focus {
  outline: none; border-color: var(--accent); background: #fff;
}
.la-checks { display: flex; flex-direction: column; gap: 9px; }
.la-check {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13.5px; line-height: 1.45; color: var(--ink-soft);
  cursor: pointer; padding: 7px 10px; border-radius: 3px;
  border: 1px solid transparent;
}
.la-check:hover { background: var(--paper-dark); }
.la-check.on { background: var(--gold-dim); border-color: var(--gold); }
.la-check input { margin-top: 3px; accent-color: var(--accent); flex-shrink: 0; }
.la-check .la-cite { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.la-check.disabled { position: relative; opacity: 0.42; cursor: not-allowed; }
.la-check.disabled:hover { background: transparent; }
.la-check.disabled input { pointer-events: none; }
.la-tip {
  position: absolute; left: 8px; right: 8px; top: calc(100% - 2px); z-index: 30;
  background: var(--ink); color: var(--paper);
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; line-height: 1.45;
  padding: 8px 10px; border-radius: 5px; border: 1px solid var(--gold);
  opacity: 0; transform: translateY(-4px); pointer-events: none; transition: opacity .12s, transform .12s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.28);
}
.la-check.disabled:hover .la-tip { opacity: 1; transform: translateY(0); }
.la-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
.la-btn {
  font-family: 'Fraunces', serif; font-size: 14px; font-weight: 500;
  padding: 10px 20px; border-radius: 3px; cursor: pointer;
  border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
  transition: all 0.15s;
}
.la-btn:hover { background: var(--accent); border-color: var(--accent); }
.la-btn.ghost { background: transparent; color: var(--ink); }
.la-btn.ghost:hover { background: var(--paper-dark); color: var(--ink); }
.la-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* verdict */
.la-verdict {
  border-radius: 4px; padding: 20px 22px; margin-bottom: 18px;
  border-left: 5px solid var(--muted); background: #fff; border: 1px solid var(--border);
}
.la-verdict.eligible { border-left-color: var(--green-soft); background: rgba(45,106,79,0.05); }
.la-verdict.likely  { border-left-color: var(--gold); background: var(--gold-dim); }
.la-verdict.review  { border-left-color: var(--amber); background: rgba(166,107,44,0.06); }
.la-verdict.no      { border-left-color: var(--accent); background: var(--red-dim); }
.la-verdict .la-vlabel {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
}
.la-verdict .la-vmain {
  font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700;
  margin: 4px 0 8px; color: var(--ink);
}
.la-verdict .la-vbody { font-size: 13.5px; line-height: 1.65; color: var(--ink-soft); }
.la-prov { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
.la-prov-item {
  font-size: 13px; line-height: 1.5; padding: 9px 12px; background: #fff;
  border: 1px solid var(--border); border-radius: 3px;
}
.la-prov-item strong { color: var(--accent); }
.la-prov-item .la-cite { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

/* checklist */
.la-clgroup { margin-bottom: 16px; }
.la-clgroup .la-clhead {
  font-size: 11.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--accent-soft); margin-bottom: 7px; border-bottom: 1px solid var(--border); padding-bottom: 4px;
}
.la-srclink { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--gold); }
.la-srclink:hover { color: var(--accent-soft); background: var(--gold-dim); }
.la-clitem {
  display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px;
  line-height: 1.5; padding: 5px 0; color: var(--ink-soft);
}
.la-clitem .la-box {
  width: 15px; height: 15px; border: 1.5px solid var(--muted); border-radius: 2px;
  flex-shrink: 0; margin-top: 2px;
}
.la-clitem .la-why { display: block; font-size: 11.5px; color: var(--muted); font-style: italic; }

/* guardrail banner */
.la-guard {
  background: rgba(139,0,0,0.06); border: 1px solid var(--accent);
  border-radius: 4px; padding: 14px 18px; margin-bottom: 22px;
  font-size: 12.5px; line-height: 1.6; color: var(--ink-soft);
}
.la-guard strong { color: var(--accent); font-family: 'Fraunces', serif; font-size: 13.5px; }
.la-guard.block { background: var(--accent); color: var(--paper); border-color: var(--accent); }
.la-guard.block strong { color: var(--paper); }

/* log + tests */
.la-logrow {
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink-soft);
  padding: 7px 10px; border-bottom: 1px solid var(--border); line-height: 1.5;
}
.la-logrow:last-child { border-bottom: none; }
.la-logrow .la-ts { color: var(--muted); }
.la-test {
  font-size: 12.5px; padding: 8px 11px; border-radius: 3px; margin-bottom: 6px;
  display: flex; justify-content: space-between; gap: 12px; line-height: 1.4;
}
.la-test.pass { background: rgba(45,106,79,0.08); border: 1px solid var(--green-soft); }
.la-test.fail { background: var(--red-dim); border: 1px solid var(--accent); }
.la-test .la-tv { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.la-pill {
  display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  padding: 2px 7px; border-radius: 10px; background: var(--paper-dark); color: var(--slate);
  margin: 2px 4px 2px 0;
}
</style>
</head>
